{% extends "admin/change_list.html" %}
{% load static %}

{% block object-tools-items %}
    <li>
        <a href="{% url 'admin:video_upload' %}" class="addlink">
            Upload Video
        </a>
    </li>
    <li>
        <a href="{% url 'admin:video_ingest' %}" class="addlink">
            Ingest from Cloudflare
        </a>
    </li>
    {{ block.super }}
{% endblock %}

{% block extrahead %}
{{ block.super }}
<style>
    .video-refresh-toast {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #417690;
        color: white;
        padding: 15px 20px;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .video-refresh-toast button {
        background: white;
        color: #417690;
        border: none;
        padding: 5px 15px;
        border-radius: 3px;
        cursor: pointer;
        font-weight: bold;
    }
    .video-refresh-toast button:hover {
        background: #f0f0f0;
    }
</style>
<script>
(function() {
    // Poll processing videos by querying their status API directly.
    // This replaces the old approach of submitting the CF Stream action form,
    // which caused [object HTMLSelectElement] errors and didn't work for R2 videos.
    let pollingInterval = null;
    let toastShown = false;

    function showReloadToast() {
        if (toastShown) return;
        toastShown = true;
        const toast = document.createElement('div');
        toast.className = 'video-refresh-toast';
        toast.innerHTML = `
            <span>Videos finished processing!</span>
            <button onclick="window.location.reload()">Reload to see updates</button>
        `;
        document.body.appendChild(toast);
    }

    function getProcessingVideoIds() {
        const ids = [];
        document.querySelectorAll('#result_list tbody tr').forEach(row => {
            const statusCell = row.querySelector('td.field-status');
            if (statusCell && statusCell.textContent.trim().toLowerCase() === 'processing') {
                const checkbox = row.querySelector('input[name="_selected_action"]');
                if (checkbox) ids.push(checkbox.value);
            }
        });
        return ids;
    }

    async function pollProcessingVideos() {
        const videoIds = getProcessingVideoIds();
        if (videoIds.length === 0) {
            clearInterval(pollingInterval);
            pollingInterval = null;
            return;
        }

        // Check each processing video's status via the API
        const checks = videoIds.map(id =>
            fetch(`/admin/archive/video/${id}/processing-status/`)
                .then(r => r.ok ? r.json() : null)
                .catch(() => null)
        );
        const results = await Promise.all(checks);
        const anyReady = results.some(r => r && r.status === 'ready');
        if (anyReady) showReloadToast();
    }

    document.addEventListener('DOMContentLoaded', function() {
        const processingIds = getProcessingVideoIds();
        if (processingIds.length > 0) {
            pollingInterval = setInterval(pollProcessingVideos, 10000);
        }
    });
})();
</script>
{% endblock %}
